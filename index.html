<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Disease Detector & Farm Advisor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Load TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <!-- Load Teachable Machine Image Model -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
            <h1>AI Crop Advisor</h1>
        </div>
        <p class="subtitle">Instant disease detection & prevention advice for farmers</p>
    </header>

    <main class="container">
        <div class="main-content">
            <!-- Upload Section -->
            <section class="card upload-section" id="upload-section">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        <p>Drag and drop a crop leaf image here</p>
                        <p class="text-sm text-gray">or</p>
                        <label for="file-input" class="btn primary-btn">Browse Files</label>
                        <input type="file" id="file-input" accept="image/*" hidden>
                    </div>
                    <img id="image-preview" class="preview-img hidden" alt="Image Preview">
                </div>
                <div class="actions center hidden" id="action-container">
                    <button id="analyze-btn" class="btn primary-btn large-btn">
                        <span class="btn-text">Analyze Crop</span>
                        <div class="spinner hidden" id="loading-spinner"></div>
                    </button>
                    <button id="reset-btn" class="btn secondary-btn">Reset</button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="card results-section hidden" id="results-section">
                <div class="result-header">
                    <h2>Analysis Results</h2>
                    <span class="badge" id="status-badge">Processing...</span>
                </div>
                
                <div class="prediction-box">
                    <h3 id="disease-name">Detecting...</h3>
                    <div class="confidence-container">
                        <div class="confidence-label">
                            <span>Confidence</span>
                            <span id="confidence-percentage">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="confidence-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="logic-engine-box">
                    <div class="advisory-header" style="color: #8e44ad;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                        <h3>Diagnostic Logic Engine</h3>
                    </div>
                    <div id="logic-content" class="logic-content">
                        <div class="loading-pulse">Evaluating rules...</div>
                    </div>
                </div>

                <div class="advisory-box">
                    <div class="advisory-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        <h3>AI Treatment Advice</h3>
                    </div>
                    <div id="advisory-content" class="advisory-content">
                        <div class="loading-pulse">Generating advice from AI...</div>
                    </div>
                </div>
            </section>
        </div>

        <!-- History Section -->
        <aside class="sidebar">
            <div class="card history-section">
                <div class="history-header">
                    <h3>Recent Analyses</h3>
                    <button id="clear-history" class="btn icon-btn" title="Clear History">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <!-- History items will be inserted here -->
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
